<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Contabilidad</title>
    <!-- Usamos Tailwind CSS para un diseño rápido y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* gray-100 */
        }
        /* Ocultar flechas en los inputs numéricos */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        /* Estilos específicos para impresión */
        @media print {
            @page { size: A4; margin: 1cm; }
            body { 
                background-color: white !important; 
            }
            /* Evitar cortes de fila en impresión nativa */
            tr {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
    <!-- Librería para generar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Librerías para el Calendario (Flatpickr) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-12 print:pb-0">

    <!-- CONTENEDOR PRINCIPAL (Vista Web Colorida - Se oculta al imprimir) -->
    <div id="mainContainer" class="max-w-lg mx-auto pt-8 px-4 sm:px-0 space-y-6 print:hidden">
        
        <!-- Encabezado y Balance -->
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-white opacity-5 blur-2xl"></div>
            <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-24 h-24 rounded-full bg-blue-500 opacity-10 blur-xl"></div>
            
            <h1 class="text-slate-300 text-sm font-medium tracking-wide uppercase mb-1">Balance Total</h1>
            <div class="text-4xl sm:text-5xl font-bold tracking-tight mb-6" id="totalBalance">$0.00</div>
            
            <div class="flex justify-between items-center border-t border-slate-700 pt-4">
                <div class="flex flex-col">
                    <span class="text-slate-400 text-xs uppercase font-medium flex items-center gap-1">
                        <svg class="w-3 h-3 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                        Ingresos
                    </span>
                    <span class="text-lg font-semibold text-emerald-400" id="totalIncome">$0.00</span>
                </div>
                <div class="flex flex-col text-right">
                    <span class="text-slate-400 text-xs uppercase font-medium flex items-center justify-end gap-1">
                        <svg class="w-3 h-3 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                        Gastos
                    </span>
                    <span class="text-lg font-semibold text-rose-400" id="totalExpense">$0.00</span>
                </div>
            </div>
        </div>

        <!-- Formulario para agregar transacción -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
            <h2 class="text-lg font-semibold mb-4 text-gray-800">Nueva Transacción</h2>
            <form id="transactionForm" class="space-y-4">
                
                <div class="grid grid-cols-2 gap-4">
                    <!-- Tipo -->
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Tipo</label>
                        <select id="type" class="w-full bg-gray-50 border border-gray-200 text-gray-700 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-shadow">
                            <option value="income">Ingreso</option>
                            <option value="expense" selected>Gasto</option>
                        </select>
                    </div>
                    
                    <!-- Fecha -->
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Fecha</label>
                        <input type="text" id="transactionDate" required placeholder="Selecciona la fecha" class="w-full bg-gray-50 border border-gray-200 text-gray-700 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-shadow bg-white">
                    </div>
                </div>

                <!-- Monto -->
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Monto ($)</label>
                    <input type="text" inputmode="decimal" id="amount" required placeholder="0,00" class="w-full bg-gray-50 border border-gray-200 text-gray-700 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-shadow">
                </div>

                <!-- Concepto (Desplegable) -->
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-2">Concepto <span class="text-rose-500">*</span></label>
                    
                    <div class="flex gap-2 mb-3">
                        <select id="conceptSelect" class="flex-1 bg-gray-50 border border-gray-200 text-gray-700 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-shadow appearance-none">
                            <!-- Las opciones se inyectan por JS -->
                        </select>
                        <button type="button" id="deleteConceptBtn" class="bg-rose-50 hover:bg-rose-100 text-rose-500 font-medium rounded-xl px-3 py-2.5 transition-colors disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-rose-50" title="Eliminar concepto seleccionado">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="newConceptInput" placeholder="Añadir nuevo concepto..." class="flex-1 bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-shadow">
                        <button type="button" id="addConceptBtn" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium rounded-xl px-4 py-2 text-sm transition-colors">
                            Añadir
                        </button>
                    </div>
                    <p id="conceptError" class="text-xs text-rose-500 mt-1 hidden">Por favor, selecciona un concepto.</p>
                </div>

                <!-- Botón Guardar -->
                <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium rounded-xl py-3 transition-colors shadow-sm active:scale-[0.98]">
                    Agregar Transacción
                </button>
            </form>
        </div>

        <!-- Historial de Transacciones (Vista Web) -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <h2 class="text-lg font-semibold text-gray-800">Historial</h2>
                <div class="flex flex-wrap gap-2">
                    <!-- Importar -->
                    <input type="file" id="importFile" accept=".json" class="hidden">
                    <button onclick="document.getElementById('importFile').click()" class="text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-xl text-sm font-medium transition-colors flex items-center gap-2" title="Importar datos (JSON)">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Importar
                    </button>
                    <!-- Exportar -->
                    <button onclick="exportJSON()" class="text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-xl text-sm font-medium transition-colors flex items-center gap-2" title="Exportar datos (JSON)">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Exportar
                    </button>
                    <!-- PDF -->
                    <button onclick="generatePDF()" class="text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-xl text-sm font-medium transition-colors flex items-center gap-2" title="Descargar como PDF">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                        PDF
                    </button>
                </div>
            </div>
            
            <div id="emptyState" class="text-center py-8 hidden">
                <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3">
                    <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <p class="text-gray-500 text-sm">Cargando datos o no hay transacciones...</p>
            </div>

            <ul id="transactionList" class="space-y-3">
                <!-- Los items se inyectan por JavaScript -->
            </ul>
        </div>
    </div>

    <!-- CONTENEDOR EXCLUSIVO PARA IMPRESIÓN Y PDF (Vista de Tabla limpia) -->
    <!-- Se mantiene oculto en la web normal (hidden) pero se muestra al imprimir (print:block) -->
    <div id="printView" class="hidden print:block bg-white text-black w-full p-8 print:p-0 max-w-4xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold uppercase tracking-wider mb-1">Reporte de Contabilidad</h1>
            <p id="printDateRange" class="text-sm text-gray-600"></p>
        </div>

        <div class="flex justify-between mb-6 text-sm border-b-2 border-gray-800 pb-3">
            <div><strong>Balance Total:</strong> <span id="printBalance"></span></div>
            <div><strong>Ingresos:</strong> <span id="printIncome"></span></div>
            <div><strong>Gastos:</strong> <span id="printExpense"></span></div>
        </div>

        <table class="w-full text-sm border-collapse border border-gray-800">
            <thead>
                <tr class="bg-gray-100">
                    <th class="border border-gray-800 p-2 text-center w-28">Fecha</th>
                    <th class="border border-gray-800 p-2 text-left">Concepto</th>
                    <th class="border border-gray-800 p-2 text-center w-28">Tipo</th>
                    <th class="border border-gray-800 p-2 text-right w-36">Monto</th>
                </tr>
            </thead>
            <tbody id="printTableBody">
                <!-- Inyectado por JS -->
            </tbody>
        </table>
    </div>

    <!-- Lógica de la aplicación integrando Base de Datos y Modo Local -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Variables Globales
        let useFirebase = false;
        let db, auth, currentUser = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Base de datos local persistente (IndexedDB) para cuando usas el archivo .html en Chrome
        const localDB = {
            init: function() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('MiContabilidadDB', 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('store')) {
                            db.createObjectStore('store');
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            save: async function(key, data) {
                try {
                    const db = await this.init();
                    return new Promise((resolve, reject) => {
                        const tx = db.transaction('store', 'readwrite');
                        tx.objectStore('store').put(data, key);
                        tx.oncomplete = () => resolve();
                        tx.onerror = () => reject(tx.error);
                    });
                } catch (e) { console.error("Error guardando localmente:", e); }
            },
            load: async function(key) {
                try {
                    const db = await this.init();
                    return new Promise((resolve, reject) => {
                        const tx = db.transaction('store', 'readonly');
                        const req = tx.objectStore('store').get(key);
                        req.onsuccess = () => resolve(req.result);
                        req.onerror = () => reject(req.error);
                    });
                } catch (e) { return null; }
            }
        };

        // Intentar conectar a Firebase (Falla intencionalmente si abres el archivo local en tu PC)
        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
            const firebaseConfig = JSON.parse(configStr);
            if (Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                useFirebase = true;
            }
        } catch (e) {
            console.info("Ejecutando en Modo Local. Los datos se guardarán en tu navegador Chrome.");
        }

        // Estado de la aplicación
        let transactions = [];
        let concepts = ['Sueldo', 'Supermercado', 'Servicios', 'Transporte', 'Ocio']; // Por defecto
        let selectedConcept = '';

        // Elementos DOM
        const balanceEl = document.getElementById('totalBalance');
        const incomeEl = document.getElementById('totalIncome');
        const expenseEl = document.getElementById('totalExpense');
        const formEl = document.getElementById('transactionForm');
        const listEl = document.getElementById('transactionList');
        const emptyStateEl = document.getElementById('emptyState');
        const conceptSelectEl = document.getElementById('conceptSelect');
        const deleteConceptBtn = document.getElementById('deleteConceptBtn');
        const newConceptInput = document.getElementById('newConceptInput');
        const addConceptBtn = document.getElementById('addConceptBtn');
        const conceptErrorEl = document.getElementById('conceptError');
        const dateInputEl = document.getElementById('transactionDate');
        const amountInputEl = document.getElementById('amount');
        const printBalanceEl = document.getElementById('printBalance');
        const printIncomeEl = document.getElementById('printIncome');
        const printExpenseEl = document.getElementById('printExpense');
        const printTableBodyEl = document.getElementById('printTableBody');
        const printDateRangeEl = document.getElementById('printDateRange');

        // Autenticación si usamos Firebase
        if (useFirebase) {
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Error al autenticar:", error);
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    loadUserData(user.uid);
                } else {
                    currentUser = null;
                }
            });
        } else {
            // Modo local: Cargar datos guardados previamente en tu Chrome (IndexedDB)
            localDB.load('userConcepts').then(data => {
                if (data && data.length > 0) concepts = data;
                renderConcepts();
            });
            localDB.load('userTransactions').then(data => {
                if (data) transactions = data;
                if (transactions.length === 0) {
                    emptyStateEl.querySelector('p').innerText = 'Aún no hay transacciones registradas.';
                }
                updateUI();
            });
        }

        // Carga los datos desde la nube (si se abre en la web)
        function loadUserData(uid) {
            const conceptsRef = doc(db, 'artifacts', appId, 'users', uid, 'settings', 'userConcepts');
            onSnapshot(conceptsRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().list) {
                    concepts = docSnap.data().list;
                } else {
                    setDoc(conceptsRef, { list: concepts }).catch(console.error);
                }
                renderConcepts();
            }, (error) => console.error("Error cargando conceptos:", error));

            const txRef = collection(db, 'artifacts', appId, 'users', uid, 'transactions');
            onSnapshot(txRef, (snapshot) => {
                transactions = [];
                snapshot.forEach((docSnap) => {
                    transactions.push({ id: docSnap.id, ...docSnap.data() });
                });
                updateUI();
            }, (error) => console.error("Error cargando transacciones:", error));
        }

        // Función para enviar los conceptos a la base de datos (Nube o Local)
        async function saveConceptsToDB(newConcepts) {
            if (useFirebase && currentUser) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'userConcepts'), { list: newConcepts });
                } catch (error) {
                    console.error("Error al guardar concepto:", error);
                }
            } else if (!useFirebase) {
                await localDB.save('userConcepts', newConcepts);
            }
        }

        // Formateador de moneda
        const formatter = new Intl.NumberFormat('es-AR', {
            style: 'currency',
            currency: 'ARS',
            minimumFractionDigits: 2
        });

        // Inicializar calendario
        const datePicker = flatpickr("#transactionDate", {
            locale: "es",
            dateFormat: "d/m/Y",
            defaultDate: "today",
            disableMobile: "true"
        });

        // Formatear monto en tiempo real
        amountInputEl.addEventListener('input', function(e) {
            let value = e.target.value;
            value = value.replace(/[^\d,]/g, '');
            const parts = value.split(',');
            if (parts.length > 2) parts.pop();
            if (parts[0]) parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            e.target.value = parts.join(',');
        });

        // Función Principal: Actualiza la web colorida Y la tabla oculta
        function updateUI() {
            const amounts = transactions.map(t => t.type === 'income' ? t.amount : -t.amount);
            const total = amounts.reduce((acc, item) => acc + item, 0);
            const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);

            balanceEl.innerText = formatter.format(total);
            incomeEl.innerText = formatter.format(income);
            expenseEl.innerText = formatter.format(expense);

            printBalanceEl.innerText = formatter.format(total);
            printIncomeEl.innerText = formatter.format(income);
            printExpenseEl.innerText = formatter.format(expense);

            listEl.innerHTML = '';
            printTableBodyEl.innerHTML = '';
            
            if (transactions.length === 0) {
                emptyStateEl.classList.remove('hidden');
                printTableBodyEl.innerHTML = '<tr><td colspan="4" class="border border-gray-800 p-4 text-center text-gray-500">No hay transacciones registradas.</td></tr>';
            } else {
                emptyStateEl.classList.add('hidden');
                
                const sortedWeb = [...transactions].sort((a, b) => b.date === a.date ? b.id.localeCompare(a.id) : b.date - a.date);
                const sortedPrint = [...transactions].sort((a, b) => a.date - b.date);

                sortedWeb.forEach(t => {
                    const isIncome = t.type === 'income';
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between p-3 rounded-2xl hover:bg-gray-50 transition-colors group';
                    li.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="transaction-date w-24 text-xs font-medium text-slate-500 bg-slate-100 px-2 py-1.5 rounded-lg text-center border border-slate-200 shrink-0">
                                ${new Date(t.date).toLocaleDateString('es-AR', {day: '2-digit', month: '2-digit', year: 'numeric'})}
                            </div>
                            <div class="w-10 h-10 rounded-full flex shrink-0 items-center justify-center ${isIncome ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                ${isIncome 
                                    ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>' 
                                    : '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>'}
                            </div>
                            <div><p class="text-sm font-semibold text-gray-800">${t.concept}</p></div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-semibold ${isIncome ? 'text-emerald-500' : 'text-rose-500'}">
                                ${isIncome ? '+' : '-'}${formatter.format(t.amount)}
                            </span>
                            <button onclick="window.deleteTransaction('${t.id}')" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1" title="Eliminar">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                    listEl.appendChild(li);
                });

                sortedPrint.forEach(t => {
                    const isIncome = t.type === 'income';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="border border-gray-800 p-2 text-center text-gray-700">${new Date(t.date).toLocaleDateString('es-AR', {day: '2-digit', month: '2-digit', year: 'numeric'})}</td>
                        <td class="border border-gray-800 p-2 text-gray-900">${t.concept}</td>
                        <td class="border border-gray-800 p-2 text-center text-gray-700">${isIncome ? 'Ingreso' : 'Gasto'}</td>
                        <td class="border border-gray-800 p-2 text-right text-gray-900">${formatter.format(t.amount)}</td>
                    `;
                    printTableBodyEl.appendChild(tr);
                });
            }

            const todayStr = new Date().toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit' });
            let dateText = 'Generado el: ' + todayStr;
            
            if (transactions.length > 0) {
                const sortedDate = [...transactions].sort((a, b) => a.date - b.date);
                const firstDate = new Date(sortedDate[0].date).toLocaleDateString('es-AR', {day: '2-digit', month: '2-digit', year: 'numeric'});
                const lastDate = new Date(sortedDate[sortedDate.length - 1].date).toLocaleDateString('es-AR', {day: '2-digit', month: '2-digit', year: 'numeric'});
                if (firstDate !== lastDate) {
                    dateText += ` | Período: ${firstDate} al ${lastDate}`;
                } else {
                    dateText += ` | Período: ${firstDate}`;
                }
            }
            printDateRangeEl.innerText = dateText;
        }

        // Función para renderizar el menú desplegable de conceptos ordenado alfabéticamente
        function renderConcepts() {
            conceptSelectEl.innerHTML = '<option value="" disabled selected>Seleccione un concepto...</option>';
            
            // Crear una copia ordenada de los conceptos antes de mostrarlos
            const sortedConcepts = [...concepts].sort((a, b) => a.localeCompare(b, 'es'));

            sortedConcepts.forEach(concept => {
                const option = document.createElement('option');
                option.value = concept;
                option.innerText = concept;
                if (concept === selectedConcept) {
                    option.selected = true;
                }
                conceptSelectEl.appendChild(option);
            });
            
            updateDeleteBtnState();
        }

        function updateDeleteBtnState() {
            if (!conceptSelectEl.value) {
                deleteConceptBtn.disabled = true;
            } else {
                deleteConceptBtn.disabled = false;
            }
        }

        conceptSelectEl.addEventListener('change', () => {
            selectedConcept = conceptSelectEl.value; 
            conceptErrorEl.classList.add('hidden');
            updateDeleteBtnState();
        });

        // Eliminar concepto optimista y en la nube/local
        deleteConceptBtn.addEventListener('click', () => {
            const currentVal = conceptSelectEl.value;
            if (currentVal) {
                concepts = concepts.filter(c => c !== currentVal);
                if (selectedConcept === currentVal) selectedConcept = '';
                
                // 1. Actualización inmediata
                renderConcepts(); 
                // 2. Guardar
                saveConceptsToDB(concepts); 
            }
        });

        // Añadir concepto optimista y guardarlo en la nube/local
        function addNewConcept() {
            const newConcept = newConceptInput.value.trim();
            if (newConcept !== '' && !concepts.includes(newConcept)) {
                concepts.push(newConcept);
                selectedConcept = newConcept;
                newConceptInput.value = '';
                conceptErrorEl.classList.add('hidden');
                
                // 1. Actualización inmediata
                renderConcepts();
                // 2. Guardar
                saveConceptsToDB(concepts);
            } else if (concepts.includes(newConcept)) {
                selectedConcept = newConcept;
                newConceptInput.value = '';
                conceptErrorEl.classList.add('hidden');
                renderConcepts();
            }
        }

        addConceptBtn.addEventListener('click', addNewConcept);
        newConceptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); addNewConcept(); }
        });

        // Guardar transacción permanentemente
        formEl.addEventListener('submit', async function(e) {
            e.preventDefault();

            const type = document.getElementById('type').value;
            let rawAmount = amountInputEl.value.trim().replace(/\./g, '').replace(',', '.');
            const dateStr = dateInputEl.value;
            
            if (!selectedConcept) { conceptErrorEl.classList.remove('hidden'); return; }
            const amount = parseFloat(rawAmount);
            if (isNaN(amount) || amount <= 0 || !dateStr) return;

            const [day, month, year] = dateStr.split('/');
            const txId = Date.now().toString();
            const transactionData = {
                type: type,
                amount: amount,
                concept: selectedConcept,
                date: new Date(year, month - 1, day).getTime()
            };

            // 1. Actualización inmediata (El dato aparece visualmente al instante)
            transactions.push({ id: txId, ...transactionData });
            formEl.reset();
            document.getElementById('type').value = 'expense';
            datePicker.setDate(new Date());
            updateUI();

            // 2. Se envía la orden a guardar
            if (useFirebase && currentUser) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions', txId), transactionData);
                } catch (error) {
                    console.error("Error al guardar la transacción en la nube:", error);
                }
            } else if (!useFirebase) {
                // Guardar localmente
                await localDB.save('userTransactions', transactions);
            }
        });

        // Eliminar transacción desde la base de datos
        window.deleteTransaction = async function(id) {
            // 1. Actualización inmediata (Desaparece visualmente al instante)
            transactions = transactions.filter(t => t.id !== id);
            updateUI();

            // 2. Eliminar de la base de datos
            if (useFirebase && currentUser) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions', id));
                } catch (error) {
                    console.error("Error eliminando en la nube:", error);
                }
            } else if (!useFirebase) {
                // Actualizar guardado local
                await localDB.save('userTransactions', transactions);
            }
        }

        // --- Generar PDF Limpio (Estilo Excel) ---
        window.generatePDF = function() {
            const btn = document.querySelector('button[title="Descargar como PDF"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Generando...';
            
            const mainContainer = document.getElementById('mainContainer');
            const printView = document.getElementById('printView');
            
            mainContainer.classList.add('hidden');
            printView.classList.remove('hidden');

            const opt = {
                margin:       10,
                filename:     'Mi_Contabilidad.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'], avoid: 'tr' }
            };

            setTimeout(() => {
                html2pdf().set(opt).from(printView).save().then(() => {
                    mainContainer.classList.remove('hidden');
                    printView.classList.add('hidden');
                    btn.innerHTML = originalText;
                }).catch(err => {
                    console.error("Error al generar PDF: ", err);
                    mainContainer.classList.remove('hidden');
                    printView.classList.add('hidden');
                    btn.innerHTML = originalText;
                });
            }, 300);
        }

        // --- Exportar e Importar JSON ---
        window.exportJSON = function() {
            const data = { concepts, transactions };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            const dateStr = new Date().toISOString().split('T')[0]; // Fecha actual formato YYYY-MM-DD
            downloadAnchorNode.setAttribute("download", `Mi_Contabilidad_Backup_${dateStr}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        document.getElementById('importFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const parsedData = JSON.parse(event.target.result);
                    
                    if (parsedData.concepts && Array.isArray(parsedData.concepts)) {
                        concepts = parsedData.concepts;
                    }
                    if (parsedData.transactions && Array.isArray(parsedData.transactions)) {
                        transactions = parsedData.transactions;
                    }

                    // Actualizar UI instantáneamente
                    renderConcepts();
                    updateUI();

                    // Guardar en la Base de Datos (Nube o Local) para que sea permanente
                    if (useFirebase && currentUser) {
                        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'userConcepts'), { list: concepts });
                        for (const tx of transactions) {
                            await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions', tx.id), tx);
                        }
                    } else if (!useFirebase) {
                        await localDB.save('userConcepts', concepts);
                        await localDB.save('userTransactions', transactions);
                    }
                    
                    // Feedback visual en el botón de éxito
                    const btn = document.querySelector('button[title="Importar datos (JSON)"]');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> ¡Listo!';
                    setTimeout(() => btn.innerHTML = originalHTML, 2000);

                } catch (err) {
                    console.error("Error al importar JSON:", err);
                    // Feedback visual de error
                    const btn = document.querySelector('button[title="Importar datos (JSON)"]');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<span class="text-rose-500 font-bold">Error</span>';
                    setTimeout(() => btn.innerHTML = originalHTML, 2000);
                }
                
                // Limpiar el input para permitir importar el mismo archivo de nuevo si se desea
                document.getElementById('importFile').value = '';
            };
            reader.readAsText(file);
        });

        // Pintamos el diseño base y cargamos si es necesario (el cargar local está arriba)
        renderConcepts();
        updateUI();

    </script>
</body>
</html>
